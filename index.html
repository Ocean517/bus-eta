<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="青衣巴士">
  <title>巴士到站時間</title>
  <style>
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      margin: 0;
      padding: 8px;
      color: #eee;
      height: 100vh;
      overflow: hidden;
    }
    .container { 
      max-width: 100%; 
      margin: auto; 
    }
    h1 { 
      text-align: center; 
      color: #ff4d4d; 
      margin: 12px 0 16px;
      font-size: 1.65em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .stop-card {
      background: #2a2a2a;
      margin: 10px 0;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    .header {
      background: #e30613;
      color: white;
      padding: 16px 18px;
      font-size: 1.4em;
      font-weight: bold;
    }

    .route-info {
      padding: 12px 18px;
      background: #2a2a2a;
      border-bottom: 1px solid #444;
      font-size: 1.15em;
      color: #ccc;
    }

    .eta-box { padding: 18px; }

    .eta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
      border-bottom: 1px solid #444;
    }
    .eta-row:last-child { border-bottom: none; }

    .route-dest {
      font-size: 1.55em;
      font-weight: bold;
    }
    .route { color: #ff4d4d; }
    .dest { color: #bbb; font-size: 1.1em; margin-top: 6px; }

    .minutes {
      font-size: 3.8em;
      font-weight: bold;
      color: #4ade80;
      text-align: right;
      line-height: 1;
    }

    .min-label {
      font-size: 1.2em;
      color: #4ade80;
      text-align: right;
      margin-top: -10px;
    }

    .remark {
      font-size: 1em;
      color: #ff6b6b;
      text-align: right;
      margin-top: 8px;
    }

    .loading {
      text-align: center;
      padding: 50px 20px;
      color: #888;
      font-style: italic;
      font-size: 1.1em;
    }

    .last-update {
      text-align: center;
      margin-top: 12px;
      color: #777;
      font-size: 1em;
    }

    button {
      font-size: 0.75em;
      padding: 8px 16px;
      background: #e30613;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      🚌 巴士到站時間
      <button onclick="refreshAll()">⟳</button>
    </h1>

    <!-- 1. 翠怡花園 41A -->
    <div class="stop-card">
      <div class="header">翠怡花園 (TY243) → 尖沙咀東</div>
      <div class="route-info">41A 青衣(長安邨) 開出</div>
      <div class="eta-box" id="eta1"><div class="loading">正在載入...</div></div>
    </div>

    <!-- 2. 青衣警署 A32 -->
    <div class="stop-card">
      <div class="header">青衣警署 (TY352) → 葵涌邨</div>
      <div class="route-info">A32 機場 / 港珠澳大橋 開出</div>
      <div class="eta-box" id="eta2"><div class="loading">正在載入...</div></div>
    </div>

    <!-- 3. 翠怡花園 44M -->
    <div class="stop-card">
      <div class="header">翠怡花園 (TY243) → 葵涌邨</div>
      <div class="route-info">44M 青衣站 開出</div>
      <div class="eta-box" id="eta3"><div class="loading">正在載入...</div></div>
    </div>

    <!-- 4. 青衣警署 43B -->
    <div class="stop-card">
      <div class="header">青衣警署 (TY353) → 荃灣西站</div>
      <div class="route-info">43B 青衣(長青邨) 開出</div>
      <div class="eta-box" id="eta4"><div class="loading">正在載入...</div></div>
    </div>
  </div>

  <div class="last-update" id="update-time">最後更新：--</div>

  <script>
    const configs = [
      { id: "eta1", stopId: "5BDACC01F1655F27", route: "41A" },
      { id: "eta2", stopId: "B0D304F9542AE3BF", route: "A32" },
      { id: "eta3", stopId: "5BDACC01F1655F27", route: "44M" },
      { id: "eta4", stopId: "59B81980AC8F7878", route: "43B" }
    ];

    async function getNextBus(config) {
      const box = document.getElementById(config.id);
      try {
        const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${config.stopId}`);
        if (!res.ok) throw new Error('Network error');

        const json = await res.json();
        let nextBus = null;
        let soonest = Infinity;

        if (json.data && Array.isArray(json.data)) {
          json.data.forEach(bus => {
            if (bus.route === config.route && bus.eta) {
              const time = new Date(bus.eta).getTime();
              if (time < soonest) {
                soonest = time;
                nextBus = bus;
              }
            }
          });
        }

        if (!nextBus) {
          box.innerHTML = `<div class="loading">目前沒有 ${config.route} 巴士即將到站</div>`;
          return;
        }

        const minutes = Math.round((new Date(nextBus.eta) - new Date()) / 60000);
        const timeText = minutes <= 0 ? '即將' : minutes;

        let html = `
          <div class="eta-row">
            <div>
              <div class="route-dest">
                <span class="route">${nextBus.route}</span> 
                <span class="dest">→ ${nextBus.dest_tc}</span>
              </div>
            </div>
            <div>
              <div class="minutes">${timeText}</div>
              <div class="min-label">分鐘</div>
              ${nextBus.rmk_tc ? `<div class="remark">${nextBus.rmk_tc}</div>` : ''}
            </div>
          </div>`;

        box.innerHTML = html;

      } catch (e) {
        console.error(e);
        box.innerHTML = `<div class="loading">無法連接到數據</div>`;
      }
    }

    async function refreshAll() {
      const now = new Date();
      document.getElementById('update-time').textContent = 
        `最後更新：${now.toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;

      await Promise.all(configs.map(c => getNextBus(c)));
    }

    // Initial load
    refreshAll();

    // Auto refresh
    setInterval(refreshAll, 20000);

    // Refresh when returning to the app
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') refreshAll();
    });
  </script>
</body>
</html>
