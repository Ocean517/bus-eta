<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>巴士到站時間</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f8f8f8;
      margin: 0;
      padding: 8px;
      color: #333;
    }
    .container { max-width: 100%; margin: auto; }

    h1 {
      text-align: center;
      color: #e30613;
      font-size: 1.4em;
      margin: 8px 0 12px 0;
    }

    .stop-card {
      background: white;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .header {
      background: #e30613;
      color: white;
      padding: 10px 14px;
      font-size: 1.15em;
      font-weight: bold;
      line-height: 1.3;
    }

    .route-info {
      padding: 8px 14px;
      font-size: 0.98em;
      color: #555;
      border-bottom: 1px solid #eee;
    }

    .eta-box { padding: 10px 14px; }

    .eta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .eta-row:last-child { border-bottom: none; }

    .route-dest {
      font-size: 1.22em;
      font-weight: bold;
    }
    .route { color: #e30613; }
    .dest { color: #444; font-size: 1em; margin-top: 2px; }

    .minutes {
      font-size: 2.1em;
      font-weight: bold;
      color: #2e7d32;
      text-align: right;
      min-width: 85px;
    }

    .min-label {
      font-size: 0.95em;
      color: #2e7d32;
      text-align: right;
      margin-top: -6px;
    }

    .remark {
      font-size: 0.88em;
      color: #d32f2f;
      text-align: right;
      margin-top: 3px;
    }

    .loading {
      text-align: center;
      padding: 25px 10px;
      color: #666;
      font-style: italic;
    }

    .last-update {
      text-align: center;
      margin-top: 12px;
      color: #666;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚌 巴士到站時間</h1>

    <!-- Stop 1 -->
    <div class="stop-card">
      <div class="header">翠怡花園 (TY243) → 尖沙咀東</div>
      <div class="route-info">41A 青衣(長安邨)</div>
      <div class="eta-box" id="eta1"><div class="loading">載入中...</div></div>
    </div>

    <!-- Stop 2 -->
    <div class="stop-card">
      <div class="header">青衣警署 (TY352) → 葵涌邨</div>
      <div class="route-info">A32 機場 / 港珠澳大橋</div>
      <div class="eta-box" id="eta2"><div class="loading">載入中...</div></div>
    </div>

    <!-- Stop 3 -->
    <div class="stop-card">
      <div class="header">翠怡花園 (TY243) → 葵涌邨</div>
      <div class="route-info">44M 青衣站</div>
      <div class="eta-box" id="eta3"><div class="loading">載入中...</div></div>
    </div>

    <!-- Stop 4 -->
    <div class="stop-card">
      <div class="header">青衣警署 (TY353) → 荃灣西站</div>
      <div class="route-info">43B 青衣(長青邨)</div>
      <div class="eta-box" id="eta4"><div class="loading">載入中...</div></div>
    </div>
  </div>

  <div class="last-update" id="update-time">最後更新：--</div>

  <script>
    const configs = [
      { id: "eta1", stopId: "5BDACC01F1655F27", route: "41A" },
      { id: "eta2", stopId: "B0D304F9542AE3BF", route: "A32" },
      { id: "eta3", stopId: "5BDACC01F1655F27", route: "44M" },
      { id: "eta4", stopId: "59B81980AC8F7878", route: "43B" }
    ];

    async function getETAs(config) {
      const box = document.getElementById(config.id);
      try {
        const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${config.stopId}`);
        const json = await res.json();

        let html = '';
        let count = 0;

        if (json.data && json.data.length > 0) {
          json.data.forEach(bus => {
            if (bus.route === config.route && count < 3) {
              count++;
              let minutes = '即將';
              if (bus.eta) {
                const min = Math.round((new Date(bus.eta) - new Date()) / 60000);
                minutes = min > 0 ? min : '即將';
              }

              html += `
                <div class="eta-row">
                  <div>
                    <div class="route-dest">
                      <span class="route">${bus.route}</span> 
                      <span class="dest">→ ${bus.dest_tc}</span>
                    </div>
                  </div>
                  <div>
                    <div class="minutes">${minutes}</div>
                    <div class="min-label">分鐘</div>
                    ${bus.rmk_tc ? `<div class="remark">${bus.rmk_tc}</div>` : ''}
                  </div>
                </div>`;
            }
          });
        }

        if (count === 0) {
          html = `<div class="loading">目前沒有 ${config.route} 巴士即將到站</div>`;
        }

        box.innerHTML = html;

      } catch (e) {
        box.innerHTML = `<div class="loading">網絡錯誤，請稍後重試</div>`;
      }
    }

    async function refreshAll() {
      document.getElementById('update-time').textContent = `最後更新：${new Date().toLocaleTimeString('zh-HK')}`;
      for (let c of configs) {
        await getETAs(c);
      }
    }

    refreshAll();
    setInterval(refreshAll, 25000);   // refresh every 25 seconds
  </script>
</body>
</html>
