<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>巴士到站時間</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #1e1e1e;
      margin: 0;
      padding: 8px;
      color: #ddd;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #e30613;
      color: white;
      font-size: 1.3em;
      font-weight: bold;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .time { font-size: 1.65em; }
    .temp { font-size: 1.3em; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex: 1;
    }

    .stop-card {
      background: #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .header {
      background: #e30613;
      color: white;
      padding: 10px 12px;
      font-size: 1.2em;           /* Bigger header */
      font-weight: bold;
      line-height: 1.3;
    }

    .eta-box {
      padding: 10px 12px;
    }

    .eta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #444;
    }

    .eta-row:last-child { border-bottom: none; }

    .route-dest {
      font-size: 1.45em;          /* Bigger route text */
      font-weight: bold;
    }
    .route { color: #ff5252; }
    .dest { 
      color: #bbb; 
      font-size: 1.1em; 
      margin-top: 4px; 
    }

    .minutes {
      font-size: 2.65em;          /* Significantly bigger minutes */
      font-weight: bold;
      color: #4ade80;
      text-align: right;
      min-width: 90px;
      line-height: 1;
    }

    .min-label {
      font-size: 1.1em;
      color: #4ade80;
      text-align: right;
      margin-top: -6px;
    }

    .loading {
      text-align: center;
      padding: 25px 10px;
      color: #888;
      font-style: italic;
      font-size: 1.05em;
    }

    .last-update {
      text-align: center;
      margin-top: 8px;
      color: #777;
      font-size: 0.95em;
    }
  </style>
</head>
<body>
  <div class="header-bar">
    <div class="time" id="current-time">--:--</div>
    <div class="temp" id="temperature">香港  --°C</div>
  </div>

  <div class="grid">
    <!-- 1 -->
    <div class="stop-card">
      <div class="header">翠怡花園 → 尖沙咀東</div>
      <div class="eta-box" id="eta1"><div class="loading">載入中...</div></div>
    </div>

    <!-- 2 -->
    <div class="stop-card">
      <div class="header">青衣警署 → 葵涌邨</div>
      <div class="eta-box" id="eta2"><div class="loading">載入中...</div></div>
    </div>

    <!-- 3 -->
    <div class="stop-card">
      <div class="header">翠怡花園 → 葵涌邨</div>
      <div class="eta-box" id="eta3"><div class="loading">載入中...</div></div>
    </div>

    <!-- 4 -->
    <div class="stop-card">
      <div class="header">青衣警署 → 荃灣西站</div>
      <div class="eta-box" id="eta4"><div class="loading">載入中...</div></div>
    </div>
  </div>

  <div class="last-update" id="update-time">最後更新：--</div>

  <script>
    const configs = [
      { id: "eta1", stopId: "5BDACC01F1655F27", route: "41A", short: "41A" },
      { id: "eta2", stopId: "B0D304F9542AE3BF", route: "A32", short: "A32" },
      { id: "eta3", stopId: "5BDACC01F1655F27", route: "44M", short: "44M" },
      { id: "eta4", stopId: "59B81980AC8F7878", route: "43B", short: "43B" }
    ];

    function updateClock() {
      const now = new Date().toLocaleTimeString('zh-HK', { 
        hour: '2-digit', 
        minute: '2-digit',
        hour12: false 
      });
      document.getElementById('current-time').textContent = now;
    }

    function updateTemp() {
      document.getElementById('temperature').textContent = "香港 24°C";
    }

    async function getETAs(config) {
      const box = document.getElementById(config.id);
      try {
        const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${config.stopId}`);
        const json = await res.json();

        let html = '';
        let count = 0;

        if (json.data && json.data.length > 0) {
          json.data.forEach(bus => {
            if (bus.route === config.route && count < 3) {
              count++;
              let minutes = '即將';
              if (bus.eta) {
                const min = Math.round((new Date(bus.eta) - new Date()) / 60000);
                minutes = min > 0 ? min : '即將';
              }

              html += `
                <div class="eta-row">
                  <div>
                    <div class="route-dest">
                      <span class="route">${config.short}</span> 
                      <span class="dest">→ ${bus.dest_tc}</span>
                    </div>
                  </div>
                  <div>
                    <div class="minutes">${minutes}</div>
                    <div class="min-label">分鐘</div>
                  </div>
                </div>`;
            }
          });
        }

        if (count === 0) {
          html = `<div class="loading">暫無 ${config.route} 巴士</div>`;
        }

        box.innerHTML = html;

      } catch (e) {
        box.innerHTML = `<div class="loading">載入失敗</div>`;
      }
    }

    async function refreshAll() {
      document.getElementById('update-time').textContent = `更新：${new Date().toLocaleTimeString('zh-HK')}`;
      for (let c of configs) {
        await getETAs(c);
      }
    }

    // Initialize
    updateClock();
    updateTemp();
    refreshAll();

    // Refresh rates
    setInterval(updateClock, 1000);
    setInterval(refreshAll, 8000);
  </script>
</body>
</html>
